# CI for the autofit engine (run-brief item: gates cannot silently skip).
#
# Two jobs:
# - fast-suite: the full always-on pytest suite. The junit guard fails the
#   job if fewer than the floor of tests actually RAN or if more than the
#   three KNOWN env-gated module skips appear — a new silent skip is a
#   failure, not a pass.
# - required-gates: the three RUN_AUTOFIT_GATE=1 gates with a ZERO-skip
#   guard — the gate job can never green while the gates skip.
#
# NOTE: numeric pins were calibrated on macOS/arm64; linux runners use a
# different BLAS. Fixture tolerances carry documented FP-wobble margins
# (rtol 1e-3 vs measured 1e-4) — a linux-only failure here is signal about
# platform sensitivity, not noise to be silenced.

name: autofit-tests-and-gates

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  fast-suite:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r requirements.txt pytest
      - run: pytest tests/ -q --junitxml=fast-suite.xml
      - name: no-silent-skip guard (3 known env-gated module skips allowed)
        if: always()
        run: python scripts/ci_check_junit.py fast-suite.xml --min-tests 350 --max-skipped 3

  required-gates:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r requirements.txt pytest
      - name: run the REQUIRED slow gates
        env:
          RUN_AUTOFIT_GATE: "1"
        run: >
          pytest tests/autofit/test_c1s_parity_gate.py
          tests/autofit/test_bayesian_real_gate.py
          tests/autofit/test_bayesian_u4f_unresolved_gate.py
          -q --junitxml=gates.xml
      - name: zero-skip guard — gates can never silently skip
        if: always()
        run: python scripts/ci_check_junit.py gates.xml --min-tests 5 --max-skipped 0
